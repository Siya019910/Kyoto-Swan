<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Kyoto Swan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-btn {
            background: var(--glass);
            border: 1px solid var(--purple);
            color: var(--silver);
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            white-space: nowrap;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--purple);
            color: white;
            box-shadow: 0 0 10px var(--purple-glow);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .media-box {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            background: var(--glass);
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .media-box img, .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Video specific tweak to ensure play icon/interaction is clean */
        video {
            background: black;
        }
    </style>
</head>
<body>
    <div class="background-slider"></div>

    <nav>
        <a href="index.html">HOME</a>
        <a href="services.html">SERVICES</a>
        <a href="gallery.html">GALLERY</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <header>
        <img src="logo.png" class="logo-small" alt="Kyoto Swan Logo">
        <h1 class="cursive">Our Gallery</h1>
    </header>

    <div class="container">
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all')">All Works</button>
            <button class="filter-btn" onclick="filterGallery('may')">May 2026</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Images 1 to 9 -->
            <div class="gallery-item may">
                <div class="media-box"><img src="img1.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img2.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img4.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img5.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img6.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img7.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img8.jpg" alt="Kyoto Swan Style"></div>
            </div>
            <div class="gallery-item may">
                <div class="media-box"><img src="img9.jpg" alt="Kyoto Swan Style"></div>
            </div>

            <!-- Video Item -->
            <div class="gallery-item may">
                <div class="media-box">
                    <video muted loop onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;" playsinline>
                        <source src="vid1.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p class="cursive">Kyoto Swan</p>
        <p>&copy; Trademark 2026</p>
    </footer>

    <script>
        function filterGallery(month) {
            const items = document.getElementsByClassName('gallery-item');
            const buttons = document.getElementsByClassName('filter-btn');
            
            // Update Active Button State
            for (let btn of buttons) {
                btn.classList.remove('active');
                if (btn.innerText.toLowerCase().includes(month) || (month === 'all' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                }
            }

            // Filter Items
            for (let item of items) {
                if (month === 'all') {
                    item.style.display = 'block';
                } else {
                    item.style.display = item.classList.contains(month) ? 'block' : 'none';
                }
            }
        }
    </script>
</body>
</html>
